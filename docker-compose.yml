volumes:
  app_data:

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      PRODUCT_MD_PATH: /app/product.md
    volumes:
      - ./product.md:/app/product.md:ro
      - app_data:/app/data
    ports: ["8000:8000"]
    depends_on: [redis]

  worker:
    build: ./backend
    env_file: ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      PRODUCT_MD_PATH: /app/product.md
    volumes:
      - ./product.md:/app/product.md:ro
      - app_data:/app/data
    command: celery -A app.celery_app worker --loglevel=info --concurrency=1
    depends_on: [redis]

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [backend]
